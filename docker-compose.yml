services:

  # ── Python 后端（FastAPI + MCP Server）─────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: code-ast-backend
    restart: unless-stopped
    environment:
      # 连接宿主机上已运行的 jqassistant-neo4j（neo4j:4.4，Bolt 端口 17687）
      NEO4J_URI: bolt://host.docker.internal:17687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: jqassistant123
      BACKEND_PORT: "18001"
      MCP_PORT: "18086"
    ports:
      - "18001:18001"   # FastAPI REST API
      - "18086:18086"   # MCP Server（供 AI Agent 接入）
    volumes:
      # 持久化代码仓库（扫描数据）
      - ./git-repos:/app/git-repos
      # 挂载本地 .env
      - ./.env:/app/.env:ro
    extra_hosts:
      # Windows/Mac Docker Desktop 访问宿主机的固定域名
      - "host.docker.internal:host-gateway"

  # ── React 前端（Nginx 静态服务）────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: code-ast-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "13000:3000"  # 前端访问入口
